server:
  port: 8080

spring:
  application:
    name: flix-platform
  config:
    import: optional:aws-parameterstore:/config/

  datasource:
    url: jdbc:mysql://localhost:3306/flix-db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: rootpassword
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  flyway:
    enabled: true
    locations: classpath:migration


